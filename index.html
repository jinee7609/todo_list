<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODO-List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="header-band">
      <h1>TODO-List</h1>
      <p class="subtitle">오늘의 할일 입력</p>
    </div>
    <div class="main-layout">

      <aside class="sidebar">
        <div class="sidebar-title">그룹123</div>
        <ul id="groupList"></ul>
        <button id="addGroupBtn">+ 그룹 추가</button>
      </aside>

      <div class="content-area">
        <div class="input-row">
          <input type="text" id="taskInput" placeholder="새 할 일을 입력하세요..." />
          <button id="addBtn">추가</button>
        </div>
        <textarea id="descInput" placeholder="설명 (선택사항)..."></textarea>
        <div class="form-footer">
          <select id="groupSelect">
            <option value="">그룹 없음</option>
          </select>
        </div>

        <div class="tabs">
          <button class="tab-btn active" data-tab="all">전체</button>
          <button class="tab-btn" data-tab="progress">진행 중</button>
          <button class="tab-btn" data-tab="completed">완료</button>
        </div>

        <div id="deleteBar" class="delete-bar" style="display:none;">
          <span id="selectedCount"></span>
          <button id="deleteSelectedBtn">선택 삭제</button>
        </div>

        <ul class="todo-list" id="todoList"></ul>
      </div>

    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
